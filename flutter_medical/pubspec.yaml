name: medical_diagnosis_flutter
description: AI Medical Diagnosis System - Flutter Version
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & State Management
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  
  # HTTP & File Handling
  http: ^1.1.0
  dio: ^5.3.2
  image_picker: ^1.0.4
  
  # Image Processing
  image: ^4.1.3
  
  # UI Components
  lottie: ^2.7.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
